name: Release

# Publishes the pytheum package on a GitHub Release, via OIDC Trusted Publishing
# (no stored tokens) to BOTH registries:
#   - PyPI   : the `pytheum` distribution (ships the `pytheum-mcp` console script)
#   - npm    : the `@pytheum/mcp` Node shim that spawns it via `uvx --from pytheum`
#
# Trusted-publisher config:
#   PyPI — https://pypi.org/manage/project/pytheum/settings/publishing/
#   npm  — https://www.npmjs.com/settings/pytheum/trusted-publishers
#
# Re-homed from the standalone pytheum-mcp repo (retired): the MCP server now
# lives in the pytheum package, so both artifacts publish from here.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing

jobs:
  publish-pypi:
    name: Publish pytheum to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Sanity: project version in pyproject.toml must match the release tag
      # (strip a leading 'v'). Fails early if they drift.
      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (OIDC Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish @pytheum/mcp to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Sanity: package version in npm/package.json must match the release tag.
      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Test
        run: node --test test/*.test.js

      - name: Publish (OIDC)
        run: npm publish --access public --provenance
